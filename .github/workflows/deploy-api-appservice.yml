# Deploy Node API (server/) to Azure App Service (Linux, Node 20).
# Create a separate Web App for the API (Static Web Apps only serves static files).
#
# Your SQL (example):
#   Server:   ai-rag-sql-server.database.windows.net
#   Database: ai-rag-db-1
#
# In Azure Portal → API Web App → Configuration → Application settings (not GitHub secrets):
#   AZURE_SQL_SERVER              = ai-rag-sql-server.database.windows.net
#   AZURE_SQL_PORT                = 1433
#   AZURE_SQL_DATABASE            = ai-rag-db-1
#   AZURE_SQL_USER                = <sql login>
#   AZURE_SQL_PASSWORD            = @Microsoft.KeyVault(SecretUri=...)  # or reference Key Vault
#   AZURE_SQL_ENCRYPT             = true
#   AZURE_SQL_TRUST_CERTIFICATE   = false
#   OPS_TOKEN                     = <same as GitHub secret VITE_OPS_TOKEN if you use auth>
#   WEBSITES_PORT                 = 8080   # only if you override PORT below
#
# GitHub → Settings → Secrets and variables → Actions:
#   AZURE_WEBAPP_PUBLISH_PROFILE   (Portal: API Web App → Download publish profile; paste entire XML)
#   AZURE_WEBAPP_API_NAME          = Web App name (e.g. ai-rag-api)

name: Deploy API (Azure App Service)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
    paths:
      - "server/**"
      - ".github/workflows/deploy-api-appservice.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production dependencies and zip API
        run: |
          cd server
          npm install --omit=dev
          zip -r ../api-deploy.zip . -x "*.env"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api-deploy.zip
