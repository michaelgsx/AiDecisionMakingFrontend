# Optional: deploy legacy Node API in server/ to a *separate* App Service.
# Production API is the Spring Boot app in AiDecisionMakingBackend (ai-rag-webapp).
#
# Does not run on push by default — avoids failed runs when secrets are unset.
# Manual run: Actions → "Deploy API (Azure App Service)" → Run workflow.
#
# GitHub → Settings → Secrets and variables → Actions:
#   AZURE_CREDENTIALS          (same JSON SP as SWA / backend deploy)
#   AZURE_WEBAPP_API_NAME      (e.g. ai-rag-api — must be a dedicated Node Web App)

name: Deploy API (Azure App Service)

on:
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.AZURE_CREDENTIALS != '' && secrets.AZURE_WEBAPP_API_NAME != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production dependencies and zip API
        run: |
          cd server
          npm install --omit=dev
          zip -r ../api-deploy.zip . -x "*.env"

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          package: api-deploy.zip

      - name: Azure logout
        if: always()
        run: az logout || true
