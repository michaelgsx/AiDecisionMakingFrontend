# Deploy Vite SPA to Azure Static Web Apps.
#
# Your resource (example):
#   Resource group: ai-rag-rg-1
#   Static Web App: ai-rag-web-app
#
# GitHub repo → Settings → Secrets and variables → Actions:
#   AZURE_STATIC_WEB_APPS_API_TOKEN  (Portal: Static Web App → Manage deployment token)
#   VITE_API_BASE_URL                (e.g. https://<your-api-app>.azurewebsites.net — no trailing slash)
#   VITE_OPS_TOKEN                   (optional; must match API app setting OPS_TOKEN)
#   VITE_USE_MOCK                    (optional; set to true only for UI demo without API)

name: Deploy frontend (Azure Static Web Apps)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, v1]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_OPS_TOKEN: ${{ secrets.VITE_OPS_TOKEN }}
          VITE_USE_MOCK: ${{ secrets.VITE_USE_MOCK }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: dist
          skip_app_build: true

  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Close Static Web Apps PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
