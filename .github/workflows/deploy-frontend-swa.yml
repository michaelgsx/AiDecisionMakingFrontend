# Deploy Vite SPA to Azure Static Web Apps.
# Deployment token is read from Azure Key Vault at runtime (Option B).
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Secrets (required):
#   AZURE_CREDENTIALS
#     JSON: clientId, clientSecret, tenantId, and optionally subscriptionId.
#     Grant the app "Key Vault Secrets User" on the vault (IAM on the Key Vault resource).
#     If login fails with "subscription doesn't exist" while your user is Owner:
#       the SERVICE PRINCIPAL is not the same as your user — assign the app "Reader"
#       on subscription ai_rag_subscription (IAM at subscription scope), then retry.
#     Alternatively omit "subscriptionId" from the JSON (Key Vault–only); this workflow
#       sets allow-no-subscriptions: true on Azure login.
#     Paste into GitHub secret AZURE_CREDENTIALS.
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   AZURE_KEYVAULT_NAME
#     Name of the vault only (not URI), e.g. ai-rag-key
#
# Optional repository variable:
#   KEYVAULT_SECRET_NAME
#     Defaults to webapp-deployment-token if unset.
#
# Optional secrets (Vite build-time):
#   VITE_API_BASE_URL   (no trailing slash)
#   VITE_OPS_TOKEN
#   VITE_USE_MOCK       (e.g. true for mock-only UI build)

name: Deploy frontend (Azure Static Web Apps)

on:
  workflow_dispatch:
  push:
    branches: [main, v1]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, v1]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_OPS_TOKEN: ${{ secrets.VITE_OPS_TOKEN }}
          VITE_USE_MOCK: ${{ secrets.VITE_USE_MOCK }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Fetch Static Web Apps deployment token from Key Vault
        run: |
          set -euo pipefail
          VAULT="${{ vars.AZURE_KEYVAULT_NAME }}"
          if [ -z "$VAULT" ]; then
            echo "Set repository variable AZURE_KEYVAULT_NAME to your Key Vault name (e.g. ai-rag-key)." >&2
            exit 1
          fi
          SECRET_NAME='${{ vars.KEYVAULT_SECRET_NAME }}'
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME="webapp-deployment-token"; fi
          TOKEN=$(az keyvault secret show \
            --vault-name "$VAULT" \
            --name "$SECRET_NAME" \
            --query value -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "Key Vault returned an empty secret." >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "SWA_DEPLOYMENT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: dist
          skip_app_build: true

  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Fetch Static Web Apps deployment token from Key Vault
        run: |
          set -euo pipefail
          VAULT="${{ vars.AZURE_KEYVAULT_NAME }}"
          if [ -z "$VAULT" ]; then
            echo "Set repository variable AZURE_KEYVAULT_NAME." >&2
            exit 1
          fi
          SECRET_NAME='${{ vars.KEYVAULT_SECRET_NAME }}'
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME="webapp-deployment-token"; fi
          TOKEN=$(az keyvault secret show \
            --vault-name "$VAULT" \
            --name "$SECRET_NAME" \
            --query value -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SWA_DEPLOYMENT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Close Static Web Apps PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          action: close
