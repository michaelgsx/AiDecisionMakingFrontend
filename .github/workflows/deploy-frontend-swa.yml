# Deploy Vite SPA to Azure Static Web Apps.
# Deployment token is read from Azure Key Vault at runtime (Option B).
#
# --- GitHub → Settings → Secrets and variables → Actions ---
#
# Secrets (required):
#   AZURE_CREDENTIALS
#     JSON: clientId, clientSecret, tenantId, and optionally subscriptionId.
#     Grant the app "Key Vault Secrets User" on the vault (IAM on the Key Vault resource).
#     If login fails with "subscription doesn't exist" while your user is Owner:
#       the SERVICE PRINCIPAL is not the same as your user — assign the app "Reader"
#       on subscription ai_rag_subscription (IAM at subscription scope), then retry.
#     Alternatively omit "subscriptionId" from the JSON (Key Vault–only); this workflow
#       sets allow-no-subscriptions: true on Azure login.
#     Paste into GitHub secret AZURE_CREDENTIALS.
#
# Repository variable OR secret (same name; use Variables tab OR Secrets tab):
#   AZURE_KEYVAULT_NAME
#     Vault name only (not URI), e.g. ai-rag-key
#     If Variables/Secrets are empty (e.g. fork PR), workflow falls back to default vault name
#     ai-rag-key or workflow_dispatch input keyvault_name.
#
# Optional repository variable OR secret:
#   KEYVAULT_SECRET_NAME
#     Defaults to webapp-deployment-token if unset.
#
# Optional secrets (Vite build-time):
#   VITE_API_BASE_URL   (no trailing slash)
#   VITE_OPS_TOKEN
#   VITE_USE_MOCK       (e.g. true for mock-only UI build)

name: Deploy frontend (Azure Static Web Apps)

on:
  workflow_dispatch:
    inputs:
      keyvault_name:
        description: "Azure Key Vault name (used if repo Variable/Secret AZURE_KEYVAULT_NAME is empty)"
        required: false
        type: string
        default: ai-rag-key
  push:
    branches: [main, v1]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, v1]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_OPS_TOKEN: ${{ secrets.VITE_OPS_TOKEN }}
          VITE_USE_MOCK: ${{ secrets.VITE_USE_MOCK }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Fetch Static Web Apps deployment token from Key Vault
        run: |
          set -euo pipefail
          VAULT='${{ vars.AZURE_KEYVAULT_NAME }}'
          if [ -z "$VAULT" ]; then VAULT='${{ secrets.AZURE_KEYVAULT_NAME }}'; fi
          if [ -z "$VAULT" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VAULT='${{ github.event.inputs.keyvault_name }}'
          fi
          if [ -z "$VAULT" ]; then
            VAULT="ai-rag-key"
            echo "::warning::AZURE_KEYVAULT_NAME not set in repo Variables/Secrets; using default vault name ai-rag-key. Add Variable AZURE_KEYVAULT_NAME to avoid this." >&2
          fi
          SECRET_NAME='${{ vars.KEYVAULT_SECRET_NAME }}'
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME='${{ secrets.KEYVAULT_SECRET_NAME }}'; fi
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME="webapp-deployment-token"; fi
          TOKEN=$(az keyvault secret show \
            --vault-name "$VAULT" \
            --name "$SECRET_NAME" \
            --query value -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "Key Vault returned an empty secret." >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "SWA_DEPLOYMENT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: dist
          skip_app_build: true

  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Fetch Static Web Apps deployment token from Key Vault
        run: |
          set -euo pipefail
          VAULT='${{ vars.AZURE_KEYVAULT_NAME }}'
          if [ -z "$VAULT" ]; then VAULT='${{ secrets.AZURE_KEYVAULT_NAME }}'; fi
          if [ -z "$VAULT" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VAULT='${{ github.event.inputs.keyvault_name }}'
          fi
          if [ -z "$VAULT" ]; then
            VAULT="ai-rag-key"
            echo "::warning::AZURE_KEYVAULT_NAME not set; using default ai-rag-key for PR close job." >&2
          fi
          SECRET_NAME='${{ vars.KEYVAULT_SECRET_NAME }}'
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME='${{ secrets.KEYVAULT_SECRET_NAME }}'; fi
          if [ -z "$SECRET_NAME" ]; then SECRET_NAME="webapp-deployment-token"; fi
          TOKEN=$(az keyvault secret show \
            --vault-name "$VAULT" \
            --name "$SECRET_NAME" \
            --query value -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SWA_DEPLOYMENT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Close Static Web Apps PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          action: close
