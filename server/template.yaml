AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Risk ingest API -> DynamoDB (HTTP API)

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    Architectures:
      - arm64

Parameters:
  OpsToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: 与前端 VITE_OPS_TOKEN 相同；留空则不校验（不推荐生产）

Resources:
  RiskTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      Description: POST /rag/ingest -> DynamoDB
      CodeUri: .
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref RiskTable
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
          OPS_TOKEN: !Ref OpsToken
          CORS_ORIGIN: "*"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RiskTable
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
        Ingest:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /rag/ingest
            Method: POST
        Assess:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /rag/assess
            Method: POST

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
        AllowOrigins:
          - "*"

Outputs:
  ApiUrl:
    Description: 填到前端 VITE_API_BASE_URL（不要末尾斜杠）
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref RiskTable
